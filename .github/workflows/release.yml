name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin jars
        run: ./gradlew :paper:shadowJar :velocity:shadowJar --no-daemon --stacktrace

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            paper/build/libs/xCore-Paper-*.jar
            velocity/build/libs/xCore-Velocity-*.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
